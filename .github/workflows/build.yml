name: Build XQuartz

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Prepare MacPorts Cache Directories
      run: |
        sudo mkdir -p /opt/buildX11 /opt/buildX11-cmake
        sudo chown -R $USER /opt/buildX11 /opt/buildX11-cmake

    - name: Cache MacPorts
      id: cache-macports
      uses: actions/cache@v4
      with:
        path: |
          /opt/buildX11
          /opt/buildX11-cmake
        key: macports-${{ runner.os }}-${{ hashFiles('install-or-update-macports.sh') }}
        
    - name: Set up MacPorts and dependencies
      if: steps.cache-macports.outputs.cache-hit != 'true'
      run: |
        sudo ./install-or-update-macports.sh
        
    - name: Disable Code Signing for CI
      run: |
        sed -i '' 's/--sign "${CODESIGN_IDENTITY_PKG}"//g' compile.sh
        sed -i '' 's/--sign "${CODESIGN_IDENTITY_APP}"//g' compile.sh
        sed -i '' '/codesign -s/d' compile.sh
        
    - name: Build XQuartz
      run: |
        ./compile.sh
        
    - name: Upload Installer PKG
      uses: actions/upload-artifact@v4
      with:
        name: XQuartz-Installer
        path: XQuartz-*.pkg
