name: Build XQuartz

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    # Pinned rather than macos-latest: MacPorts' binary archive buildbots lag
    # behind brand-new macOS releases (macos-latest is now macOS 26, which has
    # no prebuilt packages yet), so every port compiles from source and the
    # job runs for hours instead of minutes.
    runs-on: macos-15
    
    steps:
    - uses: actions/checkout@v4

    - name: Fetch submodules (parallel)
      run: git submodule update --init --recursive --depth 1 --jobs 8

    - name: Prepare MacPorts Cache Directories
      run: |
        chmod +x *.sh
        sudo mkdir -p /opt/local /opt/local-cmake
        sudo chown -R $USER /opt/local /opt/local-cmake

    - name: Restore MacPorts cache
      id: cache-macports
      uses: actions/cache/restore@v4
      with:
        path: |
          /opt/local
          /opt/local-cmake
        key: macports-macos-15-${{ hashFiles('install-or-update-macports.sh') }}

    - name: Rewrite /opt/buildX11 references to /opt/local
      # Every file that hardcodes the build-tools prefix, not just the two
      # install-or-update-macports.sh/compile.sh touch directly: the meson
      # cross files (pkg-config/cmake/llvm-config lookup) also reference it,
      # and were missed here before, which broke every meson-based build
      # ("Found pkg-config: NO" / "Found CMake: NO") once the toolchain
      # actually lived under /opt/local. This has to run every run,
      # regardless of the MacPorts cache-hit status below: it rewrites
      # checked-out source files, not the cached /opt/local contents, so
      # skipping it on a cache hit would leave compile.sh pointing at a
      # prefix (/opt/buildX11) that was never installed.
      run: |
        sed -i '' 's|/opt/buildX11|/opt/local|g' \
          install-or-update-macports.sh \
          compile.sh \
          src/llvm-project.confopt \
          meson_support/meson/cross/arm64-darwin-xquartz \
          meson_support/meson/cross/i386-darwin-xquartz \
          meson_support/meson/cross/x86_64-darwin-xquartz

    - name: Set up MacPorts and dependencies
      if: steps.cache-macports.outputs.cache-hit != 'true'
      run: sudo ./install-or-update-macports.sh

    - name: Save MacPorts cache
      # Explicit save right after this succeeds, rather than relying on
      # actions/cache's own end-of-job save: this step (~45min-1h on a cold
      # cache) has completed successfully on every single run so far, but
      # the cache never persisted because the LLVM build later in the same
      # job kept killing the whole runner outright (not just failing the
      # step) -- and a dead runner never reaches any later "post" hook,
      # including the implicit cache save. Save it the moment it's earned,
      # so we stop re-paying for it on every attempt regardless of what
      # LLVM does afterwards.
      if: steps.cache-macports.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: |
          /opt/local
          /opt/local-cmake
        key: ${{ steps.cache-macports.outputs.cache-primary-key }}

    - name: Install LLVM via Homebrew instead of building it
      # Building src/llvm-project from source (do_cmake_build, twice: once
      # per arch) is what's been killing the runner outright on every CI
      # attempt so far -- OOM partway through, confirmed via the
      # resource-monitor data in "Build XQuartz" below (LLVM_PARALLEL_*_JOBS
      # and make -j1 both failed to fix it reliably). Homebrew's llvm bottle
      # is prebuilt for this exact runner image, is built with
      # -DLLVM_ENABLE_RTTI=ON (matching src/llvm-project.confopt's
      # requirement for mesa's ABI) and ships both static (.a) and dylib
      # libraries, so it's a drop-in replacement for what compile.sh would
      # otherwise compile: point the meson cross files' llvm-config lookup
      # (already rewritten to /opt/local-llvm above) at it directly.
      run: |
        brew install llvm
        sudo mkdir -p /opt/local-llvm
        sudo rm -rf /opt/local-llvm
        sudo ln -s "$(brew --prefix llvm)" /opt/local-llvm
        sed -i '' '/^do_cmake_build src\/llvm-project LIB llvm$/d' compile.sh

    - name: Disable Code Signing for CI
      run: |
        sed -i '' 's/--sign "${CODESIGN_IDENTITY_PKG}"//g' compile.sh
        sed -i '' 's/--sign "${CODESIGN_IDENTITY_APP}"//g' compile.sh
        sed -i '' '/codesign -s/d' compile.sh

    - name: Build XQuartz
      run: |
        # Three prior runs got killed with no error message partway through
        # this step, and the follow-up "if: always()" diagnostics step never
        # even started -- the runner itself is dying (VM crash/reboot), not
        # compile.sh exiting with an error, so anything written only to a
        # file is lost with it. Print df/vm_stat straight to this step's own
        # log stream every 30s instead, so samples survive even if the
        # runner disappears mid-build.
        (while true; do
          echo "=== resource-monitor $(date -u +%H:%M:%S) ==="
          df -h /
          vm_stat
          sleep 30
        done) &
        MONITOR_PID=$!
        ./compile.sh
        BUILD_EXIT=$?
        kill "${MONITOR_PID}" 2>/dev/null || true
        exit ${BUILD_EXIT}

    - name: Upload Installer PKG
      uses: actions/upload-artifact@v4
      with:
        name: XQuartz-Installer
        path: XQuartz-*.pkg
