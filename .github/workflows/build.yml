name: Build XQuartz

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    # Pinned rather than macos-latest: MacPorts' binary archive buildbots lag
    # behind brand-new macOS releases (macos-latest is now macOS 26, which has
    # no prebuilt packages yet), so every port compiles from source and the
    # job runs for hours instead of minutes.
    runs-on: macos-15
    
    steps:
    - uses: actions/checkout@v4

    - name: Fetch submodules (parallel)
      run: git submodule update --init --recursive --depth 1 --jobs 8

    - name: Prepare MacPorts Cache Directories
      run: |
        chmod +x *.sh
        sudo mkdir -p /opt/local /opt/local-cmake
        sudo chown -R $USER /opt/local /opt/local-cmake

    - name: Cache MacPorts
      id: cache-macports
      uses: actions/cache@v4
      with:
        path: |
          /opt/local
          /opt/local-cmake
        key: macports-macos-15-${{ hashFiles('install-or-update-macports.sh') }}

    - name: Set up MacPorts and dependencies
      if: steps.cache-macports.outputs.cache-hit != 'true'
      run: |
        sed -i '' 's|/opt/buildX11|/opt/local|g' install-or-update-macports.sh compile.sh
        sudo ./install-or-update-macports.sh

    - name: Get LLVM submodule commit
      id: llvm-sha
      run: echo "sha=$(git -C src/llvm-project rev-parse HEAD)" >> "$GITHUB_OUTPUT"

    - name: Prepare LLVM Cache Directory
      run: |
        sudo mkdir -p /opt/buildX11-llvm
        sudo chown -R $USER /opt/buildX11-llvm

    - name: Cache LLVM build
      uses: actions/cache@v4
      with:
        # /opt/buildX11-llvm is compile.sh's own hardcoded install prefix for
        # this submodule (src/llvm-project.confopt), untouched by the
        # /opt/buildX11 -> /opt/local sed above. compile.sh always runs
        # do_cmake_build for it unconditionally (no cache-hit skip like the
        # MacPorts step), so this only avoids rebuilding objects `make`
        # already considers up to date -- it does not skip the step outright.
        path: |
          /opt/buildX11-llvm
          src/llvm-project/build.arm64
          src/llvm-project/build.x86_64
        key: llvm-macos-15-${{ steps.llvm-sha.outputs.sha }}-${{ hashFiles('src/llvm-project.confopt') }}

    - name: Disable Code Signing for CI
      run: |
        sed -i '' 's/--sign "${CODESIGN_IDENTITY_PKG}"//g' compile.sh
        sed -i '' 's/--sign "${CODESIGN_IDENTITY_APP}"//g' compile.sh
        sed -i '' '/codesign -s/d' compile.sh
        
    - name: Build XQuartz
      run: |
        ./compile.sh
        
    - name: Upload Installer PKG
      uses: actions/upload-artifact@v4
      with:
        name: XQuartz-Installer
        path: XQuartz-*.pkg
